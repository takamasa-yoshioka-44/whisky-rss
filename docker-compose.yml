services:
  # =====================================================
  # RSSHub: RSS非対応サイト → RSS化
  # =====================================================
  rsshub:
    image: diygod/rsshub:latest
    container_name: whisky-rsshub
    restart: unless-stopped
    ports:
      - "1200:1200"
    environment:
      NODE_ENV: production
      CACHE_TYPE: redis
      REDIS_URL: redis://rsshub-redis:6379/
      # 必要に応じて追加: TWITTER_TOKEN, ALLOW_USER_HOTLINK_TEMPLATE など
    depends_on:
      - rsshub-redis

  rsshub-redis:
    image: redis:alpine
    container_name: whisky-rsshub-redis
    restart: unless-stopped
    volumes:
      - rsshub-redis-data:/data

  # =====================================================
  # Miniflux: 軽量Web UIのRSSリーダー (任意)
  # =====================================================
  miniflux:
    image: miniflux/miniflux:latest
    container_name: whisky-miniflux
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - miniflux-db
    environment:
      DATABASE_URL: postgres://miniflux:${MINIFLUX_DB_PASSWORD}@miniflux-db/miniflux?sslmode=disable
      RUN_MIGRATIONS: "1"
      CREATE_ADMIN: "1"
      ADMIN_USERNAME: ${MINIFLUX_ADMIN_USER}
      ADMIN_PASSWORD: ${MINIFLUX_ADMIN_PASSWORD}

  miniflux-db:
    image: postgres:15-alpine
    container_name: whisky-miniflux-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: miniflux
      POSTGRES_PASSWORD: ${MINIFLUX_DB_PASSWORD}
      POSTGRES_DB: miniflux
    volumes:
      - miniflux-db-data:/var/lib/postgresql/data

  # =====================================================
  # Aggregator: 自前の集約・フィルタ・通知スクリプト
  # =====================================================
  aggregator:
    build: ./aggregator
    container_name: whisky-aggregator
    restart: unless-stopped
    depends_on:
      - rsshub
    environment:
      RSSHUB_BASE_URL: ${RSSHUB_BASE_URL}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      FETCH_INTERVAL_MIN: ${FETCH_INTERVAL_MIN}
      NOTIFY_BODY_MAX_CHARS: ${NOTIFY_BODY_MAX_CHARS}
      # フィルタ済みRSSの自己参照URL(Miniflux等が <link rel="self"> を見るため)
      WHISKY_OUT_PUBLIC_URL: ${WHISKY_OUT_PUBLIC_URL:-http://whisky-out}
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data

  # =====================================================
  # whisky-out: フィルタ済みRSS (aggregator 生成) の静的配信
  # =====================================================
  whisky-out:
    image: nginx:alpine
    container_name: whisky-out
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./data/out:/usr/share/nginx/html:ro

volumes:
  rsshub-redis-data:
  miniflux-db-data:
